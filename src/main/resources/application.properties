# ===============================
# Database (H2 in-memory for dev)
# ===============================
spring.datasource.url=jdbc:h2:mem:eaglebank
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# Enable H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# JWT Configuration
# ===============================
# Base64-encoded 256-bit secret (randomly generated)
eaglebank.jwt.secret=Zm9MZnZCN2o0a0pENjM5ZlRzRkdtcUdneXczWUxUNHZ1OUpSN0NmcFRQdz0=
eaglebank.jwt.issuer=eaglebank
eaglebank.jwt.expirySeconds=86400

# ===============================
# Swagger UI
# ===============================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
